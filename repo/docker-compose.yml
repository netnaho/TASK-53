services:
  db:
    image: mysql:8.0
    container_name: careops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: careops_root
      MYSQL_DATABASE: careops
      MYSQL_USER: careops_user
      MYSQL_PASSWORD: careops_pass
    ports:
      # Host port 3307 avoids conflicts with any MySQL installed on the host
      # (in-container port is still 3306, which is what the backend connects to
      # via the docker network at `db:3306`).
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucareops_user", "-pcareops_pass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8000"
      DATABASE_URL: "mysql://careops_user:careops_pass@db:3306/careops"
      RUST_LOG: "info,careops_backend=debug"
      APP_ENV: "local"
      JWT_SECRET: "careops-dev-jwt-secret-change-in-production-min-32-chars!"
      ENCRYPTION_KEY: "careops-dev-encryption-key-0123456789abcdef"
      SESSION_TTL_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careops-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # -----------------------------------------------------------------------
  # Test services — activated with: docker compose --profile test ...
  # run_tests.sh calls these automatically; no host Rust or Python needed.
  # -----------------------------------------------------------------------

  # Runs `cargo test --lib` for the backend inside the official Rust image.
  # No database required — all unit tests are pure logic.
  backend-unit-tests:
    image: rust:1.88-bookworm
    profiles: ["test"]
    volumes:
      - ./backend:/workspace
      - backend-cargo-cache:/usr/local/cargo/registry
      - backend-target-cache:/workspace/target
    working_dir: /workspace
    command: cargo test --color always

  # Runs `cargo test --lib` for the frontend pure-logic lib crate (state, models).
  # Uses native compilation — no WASM toolchain required.
  frontend-unit-tests:
    image: rust:1.88-bookworm
    profiles: ["test"]
    volumes:
      - ./frontend:/workspace
      - frontend-cargo-cache:/usr/local/cargo/registry
      - frontend-target-cache:/workspace/target
    working_dir: /workspace
    command: cargo test --lib --color always

  # Runs API shell test scripts inside a container with curl + python3.
  # Set BACKEND_URL=http://backend:8000 so scripts reach the backend service.
  api-test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    environment:
      BACKEND_URL: "http://backend:8000"
      BACKEND_READY_TIMEOUT: "120"
    depends_on:
      - backend

volumes:
  db_data:
  backend-cargo-cache:
  backend-target-cache:
  frontend-cargo-cache:
  frontend-target-cache:
